<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/analise.css">
    <script src="../js/index.js"></script>
    <title>Analisando...</title>
</head>
<body>
    <div class="square">
        <div class="titlesquare">
            <h2>sistema_de_analise.exe</h2>
            <img class="x" src="../img/x.png" alt="x">
        </div>
        <hr>
            <div class="content"> 
                <div class="heartcontent">
                    <span>Analisando...</span>
                </div>
                <div class="buttoncontent">
                    <div class="progress">
                        <div class="progress-bar"></div>
                    </div>
                </div>

                <div class="conteiner">
                    <div class="content-item analysis-box">

                        <div class="">
                            <div id="tasks"></div>
                        </div>

                   </div>
                </div>


            </div>
    </div>

<script> 
document.addEventListener("DOMContentLoaded", () => {

    const mensagens = [
        "✓ > Procurando motivo para abrir o WhatsApp...",
        "✓ > Detectando sorrisos involuntários...",
        "✓ > Verificando frequência de pensamentos...",
        "✓ > Medindo expectativa ao receber mensagens...",
        "✓ > Detectando vontade de continuar conversando...", 
        "⏳ Preparando relatório final..."

    ];

    const container = document.getElementById("tasks");

    mensagens.forEach((mensagem, index) => {

        setTimeout(() => {

            const linha = document.createElement("div");

            linha.classList.add("task");

            linha.textContent = mensagem;

            container.appendChild(linha);

        }, index * 2500);

    });

    const barra = document.querySelector(".progress");

        barra.addEventListener("animationend", () => {
            window.location.href = "resultado.html";

});

});
</script>

</body>
</html>
